};

  for (i=0; i<8; i++) {
    for (j=3; j+1; j--) {
      let b=(hash[i]>>(j*8))&255;
      result += ((b<16)?0:'') + b.toString(16);
    }
  }
  return result;
};

const getStandings = (grupo, matches, currentPreds) => {

 groupMatches.forEach(m => {
 const p = currentPreds[m.id];
 if (p && typeof p.ga === 'number' && typeof p.gb === 'number') {
 const tA = table.find(t => t.name === m.teamA);

 if (!tA || !tB) return;
 tA.pj++; tB.pj++; tA.gf += p.ga; tB.gf += p.gb; tA.gc += p.gb; tB.gc += p.ga;
 if (p.ga > p.gb) { tA.pg++; tA.pts += 3; tB.pp++; }
 else if (p.ga < p.gb) { tB.pg++; tB.pts += 3; tA.pp++; }
 else { tA.pe++; tB.pe++; tA.pts += 1; tB.pts += 1; }
 tA.dg = tA.gf - tA.gc; tB.dg = tB.gf - tB.gc;
 }
 });

 if (p.ga > p.gb) hh[m.teamA].pts += 3;
 else if (p.ga < p.gb) hh[m.teamB].pts += 3;
 else { hh[m.teamA].pts += 1; hh[m.teamB].pts += 1; }
 hh[m.teamA].gf += p.ga; hh[m.teamA].gc += p.gb;
 hh[m.teamB].gf += p.gb; hh[m.teamB].gc += p.ga;
 });

 };
 const resolveTied = (tied) => {
 if (tied.length <= 1) return tied;
 const names = tied.map(t => t.name);
 const h2h = getH2H(names);
 tied.sort((a, b) => {
 const ha = h2h[a.name], hb = h2h[b.name];
 return (hb.pts - ha.pts) || (hb.dg - ha.dg) || (hb.gf - ha.gf);
 });
 const res = [];

 while (si < tied.length) {
 let sj = si + 1;

 while (sj < tied.length) {
 const hj = h2h[tied[sj].name];
 if (hi.pts === hj.pts && hi.dg === hj.dg && hi.gf === hj.gf) sj++;
 else break;
 }
 if (sj - si > 1 && sj - si < tied.length) {
 res.push(...resolveTied(tied.slice(si, sj)));
 } else {
 for (let k = si; k < sj; k++) res.push(tied[k]);
 }
 si = sj;
 }
 return res;
 };
 table.sort((a, b) => b.pts - a.pts || b.dg - a.dg || b.gf - a.gf);
 const final = [];

 while (i < table.length) {
 let j = i + 1;
 while (j < table.length && table[j].pts === table[i].pts && table[j].dg === table[i].dg && table[j].gf === table[i].gf) j++;
 if (j - i > 1) {
 final.push(...resolveTied(table.slice(i, j)));
 } else {
 final.push(table[i]);
 }
 i = j;
 }
 return final;
};

const useToasts = () => {
    const [toasts, setToasts] = useState([]);
    const idRef = useRef(0);
    const addToast = useCallback((msg, type = 'info') => {
        const id = ++idRef.current;
        setToasts(prev => [...prev, { id, msg, type, exiting: false }]);
        setTimeout(() => { setToasts(prev => prev.map(t => t.id === id ? { ...t, exiting: true } : t)); }, 2500);
        setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, 2900);
    }, []);
    const removeToast = useCallback((id) => {
        setToasts(prev => prev.map(t => t.id === id ? { ...t, exiting: true } : t));
        setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, 400);
    }, []);
    return { toasts, addToast, removeToast };
};

const StatsDashboard = memo(({ preds, matches, groupsLocked }) => {
    const stats = useMemo(() => {
        const groupMatches = matches.filter(m => m.phase === 'Grupos');
        const knockoutMatches = matches.filter(m => m.phase !== 'Grupos');
        let groupsFilled = 0, knockoutsFilled = 0;
        groupMatches.forEach(m => { const p = preds[m.id]; if (p && typeof p.ga === 'number' && typeof p.gb === 'number') groupsFilled++; });
        knockoutMatches.forEach(m => { const p = preds[m.id]; if (p && (p.winner || (typeof p.ga === 'number' && typeof p.gb === 'number'))) knockoutsFilled++; });
        const groupsDone = Object.keys(EQUIPOS_POR_GRUPO).filter(g => matches.filter(m => m.group === g).every(m => { const p = preds[m.id]; return p && typeof p.ga === 'number' && typeof p.gb === 'number'; })).length;
        const total = groupsFilled + knockoutsFilled;
        const totalMatches = groupMatches.length + knockoutMatches.length;
        const pct = totalMatches > 0 ? Math.round((total / totalMatches) * 100) : 0;
        return { groupsFilled, knockoutsFilled, groupsDone, pct, groupTotal: groupMatches.length, knockoutTotal: knockoutMatches.length };
    }, [preds, matches]);
    return (
        <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">

  const groups = Object.keys(EQUIPOS_POR_GRUPO);
  const phaseLabels = [...groups, '16avos', '8vos', '4tos', 'Semis', 'Final', 'Bonus'];
  const oF = getFlow(officialResults, matches, r32Matchups, groupOverrides);
  const getResultSign = (a, b) => (a > b ? 1 : a < b ? -1 : 0);
  const isPlayed = (m) => {

   return !!(o && typeof o.ga === 'number' && typeof o.gb === 'number');
  };

  const allGroupsClosed = groups.every(g =>
   matches
    .filter(mt => mt.group === g)
    .every(mt => typeof officialResults[mt.id]?.ga === 'number' && typeof officialResults[mt.id]?.gb === 'number')
  );

  const getGroupPlacementPoints = (userFlow, officialFlow, group) => {
   const finished = matches
    .filter(mt => mt.group === group)
    .every(mt => typeof officialResults[mt.id]?.ga === 'number' && typeof officialResults[mt.id]?.gb === 'number');
   if (!finished) return 0;
   let pts = 0;
   userFlow.std[group].forEach((t, i) => {
    if (officialFlow.std[group][i] && t.name === officialFlow.std[group][i].name) pts += 5;
   });
   return pts;
  };

  const getR32QualifiedPoints = (userFlow, officialFlow) => {
   if (!allGroupsClosed) return 0;
   const oT = getTeamsInPhase(officialFlow, matches, 'Dieciseisavos');
   const uT = getTeamsInPhase(userFlow, matches, 'Dieciseisavos');
   let pts = 0;
   uT.forEach(team => {
    if (team !== 'TBD' && oT.has(team)) pts += 10;
   });
   return pts;
  };

  const buildPhaseSeries = (participant) => {
   const uP = participant.predictions || {};
   const uF = getFlow(uP, matches, r32Matchups);
   let cum = 0;
   const data = [];

   groups.forEach(g => {
    let gP = 0;
    matches.filter(m => m.group === g).forEach(m => {
     const o = officialResults[m.id];
     const u = uP[m.id];
     if (!o || typeof o.ga !== 'number' || typeof o.gb !== 'number') return;
     if (!u || typeof u.ga !== 'number' || typeof u.gb !== 'number') return;
     if (getResultSign(u.ga, u.gb) === getResultSign(o.ga, o.gb)) gP += 3;
     if (u.ga === o.ga) gP += 2;
     if (u.gb === o.gb) gP += 2;
    });

    gP += getGroupPlacementPoints(uF, oF, g);

    if (allGroupsClosed) {
     const oT = getTeamsInPhase(oF, matches, 'Dieciseisavos');
     const uT = getTeamsInPhase(uF, matches, 'Dieciseisavos');
     EQUIPOS_POR_GRUPO[g].forEach(team => {
      if (uT.has(team) && oT.has(team)) gP += 10;
     });
    }

    cum += gP;
    data.push(cum);
   });

   let r32Pts = 0;
   matches.filter(m => m.phase === 'Dieciseisavos').forEach(m => {
    const o = officialResults[m.id];
    const u = uP[m.id];
    if (!o || typeof o.ga !== 'number' || typeof o.gb !== 'number') return;
    if (!u || typeof u.ga !== 'number' || typeof u.gb !== 'number') return;
    if (getResultSign(u.ga, u.gb) === getResultSign(o.ga, o.gb)) r32Pts += 4;
    if (u.ga === o.ga) r32Pts += 2;
    if (u.gb === o.gb) r32Pts += 2;
   });
   cum += r32Pts;
   data.push(cum);

   [['Octavos', 12], ['Cuartos', 15], ['Semis', 20], ['Final', 25]].forEach(([phase, points]) => {
    const oT = getTeamsInPhase(oF, matches, phase);
    const uT = getTeamsInPhase(uF, matches, phase);
    let s = 0;
    if (oT.size > 0) uT.forEach(t => { if (t !== 'TBD' && oT.has(t)) s += points; });
    cum += s;
    data.push(cum);
   });

   let bonus = 0;
   if (oF._champion && oF._champion !== 'TBD' && uF._champion === oF._champion) bonus += 35;
   if (oF._third && oF._third !== 'TBD' && uF._third === oF._third) bonus += 15;
   cum += bonus;
   data.push(cum);

   return { labels: phaseLabels, data };
  };

  const buildMatchSeries = (participant) => {
   const uP = participant.predictions || {};
   let cum = 0;
   const data = [];
   const labels = [];
   const playedMatches = matches.filter(isPlayed);
   const awardedGroups = new Set();
   let awardedR32 = false;
   const awardedAdvance = { Octavos: false, Cuartos: false, Semis: false, Final: false, Bonus: false };

   const tryAwardAdvancePhase = (phase, points) => {
    if (awardedAdvance[phase]) return 0;
    const oFnow = getFlow(officialResults, matches, r32Matchups, groupOverrides);
    const oT = getTeamsInPhase(oFnow, matches, phase);
    if (oT.size === 0) return 0;
    awardedAdvance[phase] = true;
    const uFnow = getFlow(uP, matches, r32Matchups);
    const uT = getTeamsInPhase(uFnow, matches, phase);
    let bonus = 0;
    uT.forEach(t => {
     if (t !== 'TBD' && oT.has(t)) bonus += points;
    });
    return bonus;
   };

   playedMatches.forEach(m => {
    const o = officialResults[m.id];
    const u = uP[m.id];
    let stepPts = 0;

    if (u && typeof u.ga === 'number' && typeof u.gb === 'number') {
     if (m.phase === 'Grupos') {
      if (getResultSign(u.ga, u.gb) === getResultSign(o.ga, o.gb)) stepPts += 3;
      if (u.ga === o.ga) stepPts += 2;
      if (u.gb === o.gb) stepPts += 2;
     } else if (m.phase === 'Dieciseisavos') {
      if (getResultSign(u.ga, u.gb) === getResultSign(o.ga, o.gb)) stepPts += 4;
      if (u.ga === o.ga) stepPts += 2;
      if (u.gb === o.gb) stepPts += 2;
     }
    }

    cum += stepPts;

    if (m.phase === 'Grupos') {
     const groupClosed = matches
      .filter(x => x.group === m.group)
      .every(x => typeof officialResults[x.id]?.ga === 'number' && typeof officialResults[x.id]?.gb === 'number');

     if (groupClosed && !awardedGroups.has(m.group)) {
      awardedGroups.add(m.group);
      const uFnow = getFlow(uP, matches, r32Matchups);
      const oFnow = getFlow(officialResults, matches, r32Matchups, groupOverrides);
      cum += getGroupPlacementPoints(uFnow, oFnow, m.group);
     }

     const nowAllGroupsClosed = groups.every(g =>
      matches
       .filter(x => x.group === g)
       .every(x => typeof officialResults[x.id]?.ga === 'number' && typeof officialResults[x.id]?.gb === 'number')
     );

     if (nowAllGroupsClosed && !awardedR32) {
      awardedR32 = true;
      const uFnow = getFlow(uP, matches, r32Matchups);
      const oFnow = getFlow(officialResults, matches, r32Matchups, groupOverrides);
      cum += getR32QualifiedPoints(uFnow, oFnow);
     }
    }

    cum += tryAwardAdvancePhase('Octavos', 12);
    cum += tryAwardAdvancePhase('Cuartos', 15);
    cum += tryAwardAdvancePhase('Semis', 20);
    cum += tryAwardAdvancePhase('Final', 25);

    if (!awardedAdvance.Bonus) {
      const uFnow = getFlow(uP, matches, r32Matchups);
      const oFnow = getFlow(officialResults, matches, r32Matchups, groupOverrides);
      let bonus = 0;
      if (oFnow._champion && oFnow._champion !== 'TBD' && uFnow._champion === oFnow._champion) bonus += 35;
      if (oFnow._third && oFnow._third !== 'TBD' && uFnow._third === oFnow._third) bonus += 15;
      if (bonus > 0) {
        awardedAdvance.Bonus = true;
        cum += bonus;
      }
    }

    labels.push(m.phase === 'Grupos' ? `${m.group}-${m.id.split('-')[2]}` : m.id);
    data.push(cum);
   });

   return { labels, data };
  };

  const datasets = participants.map((p, pi) => {
   const series = mode === 'phase' ? buildPhaseSeries(p) : buildMatchSeries(p);
   return {
    label: p.name,
    data: series.data,
    borderColor: CHART_COLORS[pi % CHART_COLORS.length],
    backgroundColor: CHART_COLORS[pi % CHART_COLORS.length] + '20',
    borderWidth: 2,
    pointRadius: mode === 'match' ? 2 : 3,
    pointHoverRadius: mode === 'match' ? 4 : 6,
    tension: 0.25,
    fill: false
   };
  });

  const labels = mode === 'phase' ? buildPhaseSeries(participants[0]).labels : buildMatchSeries(participants[0]).labels;
  return { labels, datasets };
 }, [participants, officialResults, matches, r32Matchups, groupOverrides, mode]);

 useEffect(() => {

   chartRef.current.destroy();

 if (!chartData) return null;
 return (

const BracketSlot = memo(({ teamA, teamB, scoreA, scoreB, winner, penalties, delay, isChampion, phase }) => {
 const wA = winner && winner === teamA;
 const wB = winner && winner === teamB;
 let cls = 'bracket-slot';
 if (isChampion) cls += ' bracket-champion';
 else if (winner && winner !== 'TBD') cls += ' bracket-winner';
 return (
  <div className={cls} style={{ animationDelay: (delay * 0.07) + 's' }}>
   <div className="bracket-team-row">
    <img src={`https://flagcdn.com/w40/${FLAGS[teamA] || 'un'}.png`} className="flag" style={{width:20,height:13}} alt={teamA} loading="lazy" />
    <span className={`bracket-team-name ${wA ? 'is-winner' : ''}`}>{teamA}</span>
    {typeof scoreA === 'number' && <span className="bracket-team-score">{scoreA}</span>}
   </div>
   <div className="bracket-vs">VS</div>
   <div className="bracket-team-row">
    <img src={`https://flagcdn.com/w40/${FLAGS[teamB] || 'un'}.png`} className="flag" style={{width:20,height:13}} alt={teamB} loading="lazy" />
    <span className={`bracket-team-name ${wB ? 'is-winner' : ''}`}>{teamB}</span>

   </div>
   {penalties && <div className="bracket-penalties">PEN: {penalties}</div>}
   {phase && <div className="bracket-phase-label">{phase}</div>}
  </div>
 );
});

const BracketConnectors = ({ count, slotH, gap }) => {
 const totalH = count * (slotH + gap) - gap;
 const pairH = slotH + gap;
 const paths = [];
 for (let i = 0; i < count; i += 2) {
  const y1 = i * pairH + slotH / 2;
  const y2 = (i + 1) * pairH + slotH / 2;
  const midY = (y1 + y2) / 2;
  paths.push(<path key={i} d={`M0,${y1} L16,${y1} L16,${midY} L32,${midY}`} stroke="#1e293b" strokeWidth="2" fill="none" />);
  paths.push(<path key={i+1} d={`M0,${y2} L16,${y2} L16,${midY}`} stroke="#1e293b" strokeWidth="2" fill="none" />);
 }
 return (
  <div className="bracket-connector-col">
   <svg height={totalH} viewBox={`0 0 32 ${totalH}`} style={{ display: 'block' }}>
    {paths}
   </svg>
  </div>
 );
};

const BracketView = memo(({ matches, preds, flow, r32Matchups }) => {
 const getSlotData = (mid) => {
  const slot = flow[mid] || {};
  const p = preds[mid] || {};
  let winner = null;
  const tA = slot.a || 'TBD'; const tB = slot.b || 'TBD';
  if (typeof p.ga === 'number' && typeof p.gb === 'number') {
   if (p.ga > p.gb) winner = tA;
   else if (p.ga < p.gb) winner = tB;
   else if (p.winner && p.winner !== 'TBD') {
    if (p.winner === 'A' || p.winner === tA) winner = tA;
    else if (p.winner === 'B' || p.winner === tB) winner = tB;
   }
  } else if (p.winner && p.winner !== 'TBD') {
   if (p.winner === 'A' || p.winner === tA) winner = tA;
   else if (p.winner === 'B' || p.winner === tB) winner = tB;
  }
  return { teamA: tA, teamB: tB, scoreA: p.ga, scoreB: p.gb, winner,
   penalties: (typeof p.ga === 'number' && p.ga === p.gb && winner) ? winner : null };
 };

 const r32Ids = [];
 for (let i = 73; i <= 88; i++) r32Ids.push('M' + i);
 // Bracket order: top half M73-M80, bottom half M81-M88
 const topR32 = ['M79','M74','M73','M76','M75','M77','M78','M80'];
 const botR32 = ['M81','M82','M83','M84','M85','M86','M87','M88'];
 const allR32 = [...topR32, ...botR32];

 const r16Ids = ['M92','M89','M90','M91','M93','M94','M95','M96'];
 const qfIds = ['M97','M98','M99','M100'];
 const sfIds = ['M101','M102'];
 const finalIds = ['M103','M104']; // 3rd + final

 const rounds = [
  { label: 'Dieciseisavos', ids: allR32 },
  { label: 'Octavos', ids: r16Ids },
  { label: 'Cuartos', ids: qfIds },
  { label: 'Semis', ids: sfIds },
  { label: '3° / Final', ids: finalIds }
 ];

 const slotH = 80;
 const gap = 12;
 let idx = 0;

 return (
  <div className="view-enter">
   <div className="bracket-container" style={{ alignItems: 'center' }}>
    {rounds.map((round, ri) => (
     <React.Fragment key={ri}>
      <div className="bracket-round">
       <div className="bracket-round-title">{round.label}</div>
       {round.ids.map((mid, mi) => {
        const d = getSlotData(mid);
        const isChamp = mid === 'M104' && flow._champion && flow._champion !== 'TBD';
        idx++;
        return <BracketSlot key={mid} {...d} delay={idx} isChampion={isChamp} />;
       })}
      </div>
      {ri < rounds.length - 1 && (
       <BracketConnectors count={round.ids.length} slotH={slotH} gap={gap} />
      )}
     </React.Fragment>
    ))}
    {flow._champion && flow._champion !== 'TBD' && (
     <div className="bracket-round" style={{ minWidth: 140 }}>
      <div className="bracket-round-title">🏆 Campeón</div>
      <div className="bracket-slot bracket-champion" style={{ animationDelay: (idx * 0.07 + 0.3) + 's', textAlign: 'center', padding: '16px 12px' }}>
       <img src={`https://flagcdn.com/w40/${FLAGS[flow._champion] || 'un'}.png`} className="flag" style={{ width: 32, height: 20, margin: '0 auto 6px' }} alt={flow._champion} />
       <div className="bracket-team-name is-winner" style={{ maxWidth: 'none', textAlign: 'center', fontSize: 13 }}>{flow._champion}</div>
      </div>
     </div>
    )}
   </div>
  </div>
 );
});


const parseMatchDateTime = (dateStr, timeStr) => {
 if (!dateStr || !timeStr || timeStr === '\u2014') return null;
 const monthMap = { 'Jun': 5, 'Jul': 6 };
 const parts = dateStr.trim().split(' ');
 const day = parseInt(parts[1]);
 const mon = monthMap[parts[2]];
 if (isNaN(day) || mon === undefined) return null;
 const [h, m] = timeStr.split(':').map(Number);
 return new Date(2026, mon, day, h, m, 0);
};

const MatchDayPanel = memo(({ matches, preds, officialResults, currentUser, participants, onClose }) => {
 const [now, setNow] = useState(new Date());
 useEffect(() => { const t = setInterval(() => setNow(new Date()), 30000); return () => clearInterval(t); }, []);

 const { todayMatches, nextMatch, liveMatches } = useMemo(() => {
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
  const all = matches.map(m => {
   const dt = parseMatchDateTime(m.date, m.time);
   return { ...m, dt };
  }).filter(m => m.dt);
  const todayM = all.filter(m => m.dt >= today && m.dt < tomorrow);
  const liveM = all.filter(m => {
   if (!m.dt) return false;
   const diff = now - m.dt;
   return diff >= 0 && diff < 7200000;
  });
  const futureM = all.filter(m => m.dt > now).sort((a,b) => a.dt - b.dt);
  const nextM = futureM.length > 0 ? futureM[0] : null;
  return { todayMatches: todayM, nextMatch: nextM, liveMatches: liveM };
 }, [matches, now]);

 const formatCountdown = (dt) => {
  const diff = dt - now;
  if (diff <= 0) return null;
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  if (d > 0) return d + 'd ' + h + 'h ' + m + 'm';
  if (h > 0) return h + 'h ' + m + 'm';
  return m + 'm';
 };

 const getStatus = (m) => {
  if (!m.dt) return { label: '\u2014', cls: 'upcoming' };
  const diff = now - m.dt;
  const o = officialResults[m.id];
  if (o && typeof o.ga === 'number') return { label: '✅ FIN', cls: 'finished' };
  if (diff >= 0 && diff < 7200000) return { label: '🔴 EN VIVO', cls: 'live' };
  if (diff < 0) {
   const cd = formatCountdown(m.dt);
   return { label: '⏱ ' + cd, cls: 'upcoming' };
  }
  return { label: '✅ FIN', cls: 'finished' };
 };

 const userPreds = currentUser ? (participants.find(p => p.name === currentUser)?.predictions || preds) : preds;

 const renderMatch = (m, idx) => {
  const st = getStatus(m);

  const u = userPreds[m.id];
  const hasO = o && typeof o.ga === 'number';
  const hasU = u && typeof u.ga === 'number' && typeof u.gb === 'number';
  const hitRes = hasO && hasU && ((u.ga > u.gb ? 1 : u.ga < u.gb ? -1 : 0) === (o.ga > o.gb ? 1 : o.ga < o.gb ? -1 : 0));
  const tA = m.teamA || (m.phase !== 'Grupos' ? 'TBD' : '');

  return (

     <span className={`md-badge ${st.cls}`}>
      {st.cls === 'live' && <span className="md-countdown-tick">{'⚪'}</span>}
      {st.label}
     </span>
     <span className="text-[8px] font-black text-slate-600 uppercase tracking-wider">{m.phase === 'Grupos' ? `Grupo ${m.group}` : m.phase} · {m.time}</span>
    </div>
    <div className="flex items-center justify-between gap-3">
     <div className="flex items-center gap-2 flex-1 justify-end">
      <span className="text-[11px] font-bold text-slate-300 truncate">{tA}</span>
      <img src={`https://flagcdn.com/w40/${FLAGS[tA] || 'un'}.png`} className="flag" alt={tA} loading="lazy" />
     </div>
     <div className="flex flex-col items-center gap-1 min-w-[100px]">
      {hasU && (
       <div className={`md-score-box pred ${hitRes ? 'hit' : ''}`}>
        <span className="text-[8px] font-black text-slate-500 uppercase">Tu</span>
        <span className="font-black text-blue-400">{u.ga}</span>
        <span className="text-slate-600 text-[8px]">-</span>
        <span className="font-black text-blue-400">{u.gb}</span>
       </div>
      )}
      {hasO && (
       <div className="md-score-box official">
        <span className="text-[8px] font-black text-slate-500 uppercase">Real</span>
        <span className="font-black text-[#deff9a]">{o.ga}</span>
        <span className="text-slate-600 text-[8px]">-</span>
        <span className="font-black text-[#deff9a]">{o.gb}</span>
       </div>
      )}
      {!hasU && !hasO && <span className="text-slate-700 text-[10px] font-bold">VS</span>}
     </div>
     <div className="flex items-center gap-2 flex-1">
      <img src={`https://flagcdn.com/w40/${FLAGS[tB] || 'un'}.png`} className="flag" alt={tB} loading="lazy" />

     </div>
    </div>
    <div className="text-[8px] font-black text-slate-700 text-center mt-2 uppercase tracking-wider">{m.stadium}</div>
   </div>
  );
 };

 const displayMatches = todayMatches.length > 0 ? todayMatches : (nextMatch ? [nextMatch] : []);
 const isToday = todayMatches.length > 0;
 const hasLive = liveMatches.length > 0;

 return (
  <div className="matchday-overlay" onClick={onClose}>
   <div className="matchday-panel" onClick={e => e.stopPropagation()}>

     <div>
      <h2 className="text-2xl md:text-3xl font-black text-white uppercase tracking-tight">
       <i className={`fa-solid ${hasLive ? 'fa-circle text-red-500 text-sm mr-3 animate-pulse' : 'fa-calendar-day text-[#deff9a] mr-3'}`}></i>
       {isToday ? 'Partidos de Hoy' : 'Próximo Partido'}
      </h2>
      <p className="text-slate-500 text-xs font-bold mt-1">
       {now.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}
       {hasLive && <span className="text-red-400 ml-2">· {liveMatches.length} en vivo</span>}
      </p>

     <button onClick={onClose} className="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 text-slate-400 hover:text-white flex items-center justify-center transition-colors">
      <i className="fa-solid fa-xmark"></i>
     </button>
    </div>

    {displayMatches.length === 0 ? (

const MisResultadosPanel = memo(({ currentUser, preds, officialResults, matches, r32Matchups, groupOverrides }) => {

  const safePreds = preds || {};
  const playedMatchRows = [];

  let resultHits = 0;
  let exactScoreMatches = 0;
  let exactTeamScores = 0;
  let misses = 0;
  let noPrediction = 0;

   const o = officialResults[m.id];
   if (!o) return;

   const isScoredMatch = (m.phase === 'Grupos' || m.phase === 'Dieciseisavos') && typeof o.ga === 'number' && typeof o.gb === 'number';
   if (!isScoredMatch) return;

   const u = safePreds[m.id];
   let pts = 0;
   let status = 'none';
   let resultHit = false;
   let exactMatch = false;
   let aHit = false;
   let bHit = false;

   if (u && typeof u.ga === 'number' && typeof u.gb === 'number') {
    resultHit = sign(u.ga, u.gb) === sign(o.ga, o.gb);
    aHit = u.ga === o.ga;
    bHit = u.gb === o.gb;
    exactMatch = aHit && bHit;

    if (m.phase === 'Grupos') {
     if (resultHit) pts += 3;
    } else if (m.phase === 'Dieciseisavos') {
     if (resultHit) pts += 4;
    }
    if (aHit) pts += 2;
    if (bHit) pts += 2;

    if (exactMatch) status = 'exact';
    else if (pts > 0) status = 'partial';
    else status = 'miss';
   } else {
    status = 'none';
   }

   totalPlayedPoints += pts;
   if (status === 'none') noPrediction += 1;
   else if (exactMatch) exactScoreMatches += 1;
   else if (status === 'miss') misses += 1;

   if (resultHit) resultHits += 1;
   if (aHit) exactTeamScores += 1;
   if (bHit) exactTeamScores += 1;

   playedMatchRows.push({
    id: m.id,
    phase: m.phase,
    group: m.group || null,
    teamA: m.teamA,
    teamB: m.teamB,
    date: m.date,
    time: m.time,
    stadium: m.stadium,
    userGa: u?.ga,
    userGb: u?.gb,
    offGa: o.ga,
    offGb: o.gb,
    pts,
    status,
    resultHit,
    exactMatch,
    aHit,
    bHit
   });

  const groupPlacementRows = Object.keys(EQUIPOS_POR_GRUPO).map(group => {
   const finished = matches
    .filter(mt => mt.group === group)

   const rows = uF.std[group].map((team, idx) => ({
    team: team.name,
    userPos: idx + 1,
    officialPos: (oF.std[group].findIndex(x => x.name === team.name) + 1) || null,
    hit: finished && !!oF.std[group][idx] && oF.std[group][idx].name === team.name
   }));

   const exactCount = rows.filter(r => r.hit).length;
   return {
    group,
    finished,
    exactCount,
    points: finished ? exactCount * 5 : 0,
    rows
   };
  });

  const allGroupsDone = groupPlacementRows.every(g => g.finished);

  const qualifiedTeamsRows = allGroupsDone ? Array.from(getTeamsInPhase(uF, matches, 'Dieciseisavos')).map(team => ({
   team,
   hit: getTeamsInPhase(oF, matches, 'Dieciseisavos').has(team),
   points: getTeamsInPhase(oF, matches, 'Dieciseisavos').has(team) ? 10 : 0,
   phase: 'Dieciseisavos'
  })).sort((a,b) => (a.hit === b.hit ? a.team.localeCompare(b.team) : (a.hit ? -1 : 1))) : [];

  const phaseQualified = [['Octavos', 12], ['Cuartos', 15], ['Semis', 20], ['Final', 25]].map(([phase, points]) => {
   const userTeams = Array.from(getTeamsInPhase(uF, matches, phase));
   const officialTeams = getTeamsInPhase(oF, matches, phase);
   const isResolved = officialTeams.size > 0;
   const rows = userTeams.map(team => ({
    team,
    hit: isResolved && officialTeams.has(team),
    points: isResolved && officialTeams.has(team) ? points : 0
   })).sort((a,b) => (a.hit === b.hit ? a.team.localeCompare(b.team) : (a.hit ? -1 : 1)));
   return {
    phase,
    isResolved,
    points,
    totalPoints: rows.reduce((s, r) => s + r.points, 0),
    hits: rows.filter(r => r.hit).length,
    rows
   };
  });

  const bonusRows = [
   {
    label: 'Campeón',
    predicted: uF._champion,
    official: oF._champion,
    hit: !!(oF._champion && oF._champion !== 'TBD' && uF._champion === oF._champion),
    points: !!(oF._champion && oF._champion !== 'TBD' && uF._champion === oF._champion) ? 35 : 0

    points: !!(oF._third && oF._third !== 'TBD' && uF._third === oF._third) ? 15 : 0
   }
  ];

  const totalQualificationPoints = groupPlacementRows.reduce((s, g) => s + g.points, 0)
    + qualifiedTeamsRows.reduce((s, r) => s + r.points, 0)
    + phaseQualified.reduce((s, p) => s + p.totalPoints, 0)
    + bonusRows.reduce((s, b) => s + b.points, 0);

  return {
   summary: {
    totalPlayedPoints,
    totalQualificationPoints,
    grandTotal: totalPlayedPoints + totalQualificationPoints,
    resultHits,
    exactScoreMatches,
    exactTeamScores,
    misses,
    noPrediction
   },

   groupPlacementRows,
   qualifiedTeamsRows,
   phaseQualified,
   bonusRows
  };
 }, [currentUser, preds, officialResults, matches, r32Matchups, groupOverrides]);

                                </div>
                            </div>
                            <StatsDashboard preds={officialDraft} matches={matches} groupsLocked={false} />
                        <PredictionView matches={matches} currentPreds={officialDraft} updateFn={handleOfficialUpdate} isOfficial={true} groupsLocked={false} r32Matchups={r32Matchups} knockoutLocked={false} onLockKnockout={()=>{}} groupOverrides={groupOverrides} onReorderGroup={handleReorderGroup} />
                        </div>
                    </div>

                <p className="text-slate-700 text-xs font-bold uppercase tracking-widest">PRODE 26 · Mundial FIFA 2026 · Pasión o Razón · v22.12 🔥 DELTA LIMPIO + LOGS + 100px</p>
            </footer>
        </div>
    );
}
