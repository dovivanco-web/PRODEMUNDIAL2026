const sha256 = (ascii) => {
    const rightRotate = (value, amount) => (value>>>amount) | (value<<(32-amount));
    let mathPow=Math.pow, maxWord=mathPow(2,32);
    let lengthProperty='length', i, j;
    let result='';

    let isComposite={};
    for (let candidate=2; primeCounter<64; candidate++) {
        if (!isComposite[candidate]) {
            for (i=0; i<313; i+=candidate) isComposite[i]=candidate;
            hash[primeCounter]=(mathPow(candidate,.5)*maxWord)|0;
            k[primeCounter++]=(mathPow(candidate,1/3)*maxWord)|0;
        }
    }
    ascii += '\x80';
    while (ascii[lengthProperty]%64-56) ascii += '\x00';
    for (i=0; i<ascii[lengthProperty]; i++) {
        j=ascii.charCodeAt(i);
        words[i>>2] |= j << ((3-i)%4)*8;
    }
    words[words[lengthProperty]] = ((asciiBitLength/maxWord)|0);
    words[words[lengthProperty]] = (asciiBitLength);
    for (j=0; j<words[lengthProperty];) {
        let w=words.slice(j, j+=16);
        let oldHash=hash;
        hash=hash.slice(0,8);
        for (i=0; i<64; i++) {
            let w15=w[i-15], w2=w[i-2];
            let a=hash[0], e=hash[4];
            let temp1 = hash[7]
                + (rightRotate(e,6)^rightRotate(e,11)^rightRotate(e,25))
                + ((e&hash[5])^((~e)&hash[6]))
                + k[i]

                    + (rightRotate(w15,7)^rightRotate(w15,18)^(w15>>>3))

};

const getFlow = (currentPreds, matches, r32Override) => {
    const std = {};
    Object.keys(EQUIPOS_POR_GRUPO).forEach(g => std[g] = getStandings(g, matches, currentPreds));
    const thirds = Object.keys(std).map(g => ({ ...std[g][2], group: g })).sort((a,b) => b.pts - a.pts || b.dg - a.dg || b.gf - a.gf);
    const best8 = thirds.slice(0, 8);
    const annexeKey = best8.map(t => t.group).sort().join('');
    const annexeRow = ANNEXE_C[annexeKey] || null;
    const getThirdName = (colIdx) => {
        if (!annexeRow) return "3° TBD";
        const grp = annexeRow[colIdx];
        const t = best8.find(x => x.group === grp);
        return t ? t.name : "3° TBD";
    };
    const getR32Winner = (mid, tA, tB) => {
        const p = currentPreds[mid];
        if (!p || typeof p.ga !== 'number' || typeof p.gb !== 'number') return "TBD";
        if (p.ga > p.gb) return tA;
        if (p.ga < p.gb) return tB;
        if (p.winner && p.winner !== "TBD") {
            if (p.winner === 'A' || p.winner === tA) return tA;
            if (p.winner === 'B' || p.winner === tB) return tB;
        }
        return "TBD";
    };
    const getR32Loser = (mid, tA, tB) => {
        const w = getR32Winner(mid, tA, tB);
        if (w === "TBD") return "TBD";
        return w === tA ? tB : tA;
    };
    const getWinner = (mid, tA, tB) => {
        const p = currentPreds[mid];
        if (!p || !p.winner || p.winner === "TBD") return "TBD";
        if (p.winner === 'A' || p.winner === tA) return tA;
        if (p.winner === 'B' || p.winner === tB) return tB;
        return "TBD";
    };
    const getLoser = (mid, tA, tB) => {
        const p = currentPreds[mid];
        if (!p || !p.winner || p.winner === "TBD") return "TBD";
        if (p.winner === 'A' || p.winner === tA) return tB;
        if (p.winner === 'B' || p.winner === tB) return tA;
        return "TBD";
    };
    const d = {};
    // Dieciseisavos: si el admin cargó cruces reales, se usan acá
    if (r32Override && r32Override['M73']) {
        for (let i=73;i<=88;i++){
            const mid = `M${i}`;
            const row = r32Override[mid] || {};
            d[mid] = { a: row.a || 'TBD', b: row.b || 'TBD' };
        }
    } else {
    d['M73'] = { a: std['A'][1].name, b: std['B'][1].name };
    d['M74'] = { a: std['E'][0].name, b: getThirdName(3) };
    d['M75'] = { a: std['F'][0].name, b: std['C'][1].name };
    d['M76'] = { a: std['C'][0].name, b: std['F'][1].name };
    d['M77'] = { a: std['I'][0].name, b: getThirdName(5) };
    d['M78'] = { a: std['E'][1].name, b: std['I'][1].name };
    d['M79'] = { a: std['A'][0].name, b: getThirdName(0) };
    d['M80'] = { a: std['L'][0].name, b: getThirdName(7) };
    d['M81'] = { a: std['D'][0].name, b: getThirdName(2) };
    d['M82'] = { a: std['G'][0].name, b: getThirdName(4) };
    d['M83'] = { a: std['K'][1].name, b: std['L'][1].name };
    d['M84'] = { a: std['H'][0].name, b: std['J'][1].name };
    d['M85'] = { a: std['B'][0].name, b: getThirdName(1) };
    d['M86'] = { a: std['J'][0].name, b: std['H'][1].name };
    d['M87'] = { a: std['K'][0].name, b: getThirdName(6) };
    d['M88'] = { a: std['D'][1].name, b: std['G'][1].name };
    }
    d['M89'] = { a: getR32Winner('M74', d['M74'].a, d['M74'].b), b: getR32Winner('M77', d['M77'].a, d['M77'].b) };
    d['M90'] = { a: getR32Winner('M73', d['M73'].a, d['M73'].b), b: getR32Winner('M75', d['M75'].a, d['M75'].b) };
    d['M91'] = { a: getR32Winner('M76', d['M76'].a, d['M76'].b), b: getR32Winner('M78', d['M78'].a, d['M78'].b) };
    d['M92'] = { a: getR32Winner('M79', d['M79'].a, d['M79'].b), b: getR32Winner('M80', d['M80'].a, d['M80'].b) };
    d['M93'] = { a: getR32Winner('M83', d['M83'].a, d['M83'].b), b: getR32Winner('M84', d['M84'].a, d['M84'].b) };
    d['M94'] = { a: getR32Winner('M81', d['M81'].a, d['M81'].b), b: getR32Winner('M82', d['M82'].a, d['M82'].b) };
    d['M95'] = { a: getR32Winner('M86', d['M86'].a, d['M86'].b), b: getR32Winner('M88', d['M88'].a, d['M88'].b) };
    d['M96'] = { a: getR32Winner('M85', d['M85'].a, d['M85'].b), b: getR32Winner('M87', d['M87'].a, d['M87'].b) };
    d['M97']  = { a: getWinner('M89', d['M89'].a, d['M89'].b), b: getWinner('M90', d['M90'].a, d['M90'].b) };
    d['M98']  = { a: getWinner('M93', d['M93'].a, d['M93'].b), b: getWinner('M94', d['M94'].a, d['M94'].b) };
    d['M99']  = { a: getWinner('M91', d['M91'].a, d['M91'].b), b: getWinner('M92', d['M92'].a, d['M92'].b) };
    d['M100'] = { a: getWinner('M95', d['M95'].a, d['M95'].b), b: getWinner('M96', d['M96'].a, d['M96'].b) };
    d['M101'] = { a: getWinner('M97', d['M97'].a, d['M97'].b), b: getWinner('M98', d['M98'].a, d['M98'].b) };
    d['M102'] = { a: getWinner('M99', d['M99'].a, d['M99'].b), b: getWinner('M100', d['M100'].a, d['M100'].b) };
    d['M103'] = { a: getLoser('M101', d['M101']?.a, d['M101']?.b), b: getLoser('M102', d['M102']?.a, d['M102']?.b) };
    d['M104'] = { a: getWinner('M101', d['M101']?.a, d['M101']?.b), b: getWinner('M102', d['M102']?.a, d['M102']?.b) };
    d._champion = getWinner('M104', d['M104']?.a, d['M104']?.b);
    d._third = getWinner('M103', d['M103']?.a, d['M103']?.b);
    return { ...d, best8, std };
};

const getTeamsInPhase = (flow, matches, phase) => {
    const teams = new Set();
    matches.filter(m => m.phase === phase).forEach(m => {
        const slot = flow[m.id];
        if (slot) {
            if (slot.a && slot.a !== 'TBD') teams.add(slot.a);
            if (slot.b && slot.b !== 'TBD') teams.add(slot.b);
        }
    });
    return teams;
};

const useToasts = () => {
    const [toasts, setToasts] = useState([]);
    const idRef = useRef(0);
    const addToast = useCallback((msg, type = 'info') => {
        const id = ++idRef.current;
        setToasts(prev => [...prev, { id, msg, type, exiting: false }]);
        setTimeout(() => { setToasts(prev => prev.map(t => t.id === id ? { ...t, exiting: true } : t)); }, 2500);
        setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, 2900);
    }, []);
    const removeToast = useCallback((id) => {
        setToasts(prev => prev.map(t => t.id === id ? { ...t, exiting: true } : t));
        setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, 400);
    }, []);
    return { toasts, addToast, removeToast };
};

const ScrollTopBtn = () => {
    const [show, setShow] = useState(false);
    useEffect(() => {
        const handler = () => setShow(window.scrollY > 400);
        window.addEventListener('scroll', handler, { passive: true });
        return () => window.removeEventListener('scroll', handler);
    }, []);
    if (!show) return null;
    return (<button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} className="fixed bottom-8 right-8 z-[100] w-14 h-14 rounded-full bg-[#deff9a] text-black flex items-center justify-center shadow-2xl scroll-top-btn hover:shadow-[0_0_30px_rgba(222,255,154,0.4)]"><i className="fa-solid fa-arrow-up text-xl font-black"></i></button>);
};

const StatsDashboard = memo(({ preds, matches, groupsLocked }) => {
    const stats = useMemo(() => {
        const groupMatches = matches.filter(m => m.phase === 'Grupos');
        const knockoutMatches = matches.filter(m => m.phase !== 'Grupos');
        let groupsFilled = 0, knockoutsFilled = 0;
        groupMatches.forEach(m => { const p = preds[m.id]; if (p && typeof p.ga === 'number' && typeof p.gb === 'number') groupsFilled++; });
        knockoutMatches.forEach(m => { const p = preds[m.id]; if (p && (p.winner || (typeof p.ga === 'number' && typeof p.gb === 'number'))) knockoutsFilled++; });
        const groupsDone = Object.keys(EQUIPOS_POR_GRUPO).filter(g => matches.filter(m => m.group === g).every(m => { const p = preds[m.id]; return p && typeof p.ga === 'number' && typeof p.gb === 'number'; })).length;
        const total = groupsFilled + knockoutsFilled;
        const totalMatches = groupMatches.length + knockoutMatches.length;
        const pct = totalMatches > 0 ? Math.round((total / totalMatches) * 100) : 0;
        return { groupsFilled, knockoutsFilled, groupsDone, pct, groupTotal: groupMatches.length, knockoutTotal: knockoutMatches.length };
    }, [preds, matches]);
    return (
        <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">

            <div className="stats-card rounded-2xl p-5 border border-slate-800/50">

                <div className="text-[9px] font-black text-slate-500 uppercase tracking-widest mt-1">Partidos Grupos</div>
            </div>
            <div className="stats-card rounded-2xl p-5 border border-slate-800/50">
                <div className="text-3xl font-black text-purple-400">{stats.knockoutsFilled}<span className="text-lg text-slate-600">/{stats.knockoutTotal}</span></div>
                <div className="text-[9px] font-black text-slate-500 uppercase tracking-widest mt-1">Eliminatorias</div>

            <div className={`stats-card rounded-2xl p-5 border ${groupsLocked ? 'border-red-500/30' : 'border-slate-800/50'}`}>
                <div className="text-3xl font-black">{groupsLocked ? '\uD83D\uDD12' : '\uD83D\uDD13'}</div>
                <div className={`text-[9px] font-black uppercase tracking-widest mt-1 ${groupsLocked ? 'text-red-400' : 'text-slate-500'}`}>{groupsLocked ? 'Grupos Bloqueados' : 'Grupos Abiertos'}</div>
            </div>
        </div>
    );
});

const R32MatchRow = memo(({ m, teamA, teamB, preds, onUpdate, matchIndex, disabled }) => {
    const p = preds[m.id] || {};
    const gaVal = p.ga;
    const gbVal = p.gb;
    const hasBothScores = typeof gaVal === 'number' && typeof gbVal === 'number';
    const isDraw = hasBothScores && gaVal === gbVal;
    const hasResult = hasBothScores && !isDraw;
    const hasPenaltyPick = isDraw && p.winner && p.winner !== 'TBD';
    const isComplete = hasResult || hasPenaltyPick;
    const bothTBD = teamA === 'TBD' && teamB === 'TBD';

    const handleInputChange = (e, field) => {
        if (disabled) return;
        if (bothTBD) return;
        const val = e.target.value.replace(/[^0-9]/g, '');
        onUpdate(m.id, field, val);
        if (val.length >= 1) {
            if (field === 'ga') {
                document.getElementById(`input-r32-${m.id}-gb`)?.focus({ preventScroll: true });
            } else {
                const next = document.querySelector(`[data-r32-idx="${matchIndex + 1}"]`);
                if (next) {
                    const nid = next.getAttribute('data-r32-id');
                    document.getElementById(`input-r32-${nid}-ga`)?.focus({ preventScroll: true });
                }
            }
        }
    };

    const handlePenaltyPick = (team) => {
        if (disabled) return;
        if (team === 'TBD') return;
        onUpdate(m.id, 'winner', team);
    };

    const isPickedA = p.winner === teamA || p.winner === 'A';
    const isPickedB = p.winner === teamB || p.winner === 'B';

    return (
        <div data-r32-id={m.id} data-r32-idx={matchIndex} className={`bg-slate-900/60 p-4 rounded-2xl border flex flex-col gap-3 ${isComplete ? 'border-green-900/30 bg-green-950/10' : 'border-slate-800'} ${bothTBD ? 'opacity-40' : ''}`}>
            <div className="flex justify-between text-[9px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-800 pb-2">
                <span>Dieciseisavos</span>
                <span className="text-[#deff9a]">4 PTS + 2/GOL</span>
            </div>
            <div className="flex items-center justify-between">
                <div className="flex items-center gap-2 flex-1 justify-end overflow-hidden">
                    <span className="text-[10px] md:text-[11px] font-bold text-slate-300 truncate">{teamA}</span>
                    <img src={`https://flagcdn.com/w40/${FLAGS[teamA] || 'un'}.png`} className="flag" alt={teamA} loading="lazy" />
                </div>
                <div className="flex items-center gap-1 mx-2 md:mx-3">
                    <input id={`input-r32-${m.id}-ga`} type="text" inputMode="numeric" className="match-input" value={gaVal ?? ""} onChange={e => handleInputChange(e, 'ga')} autoComplete="off" maxLength="2" disabled={bothTBD || disabled} />
                    <span className="text-slate-600 font-bold px-1 text-[10px]">-</span>
                    <input id={`input-r32-${m.id}-gb`} type="text" inputMode="numeric" className="match-input" value={gbVal ?? ""} onChange={e => handleInputChange(e, 'gb')} autoComplete="off" maxLength="2" disabled={bothTBD || disabled} />
                </div>
                <div className="flex items-center gap-2 flex-1 overflow-hidden">
                    <img src={`https://flagcdn.com/w40/${FLAGS[teamB] || 'un'}.png`} className="flag" alt={teamB} loading="lazy" />
                    <span className="text-[10px] md:text-[11px] font-bold text-slate-300 truncate">{teamB}</span>
                </div>
            </div>
            {isDraw && (
                <div className="penalty-section rounded-xl p-3 mt-1">
                    <p className="text-[9px] font-black text-red-400 uppercase tracking-widest mb-2 text-center">
                        <i className="fa-solid fa-futbol mr-1"></i>Ganador por Penales
                    </p>
                    <div className="grid grid-cols-2 gap-2">
                        <div onClick={() => handlePenaltyPick(teamA)} className={`winner-select p-2 rounded-lg flex items-center justify-center gap-2 ${isPickedA ? 'active' : 'bg-slate-950/50'} ${teamA === 'TBD' ? 'opacity-40 cursor-not-allowed' : ''}`}>

                            <span className="text-[10px] font-black truncate">{teamA}</span>
                            <i className="fa-solid fa-check text-sm check-x"></i>
                        </div>
                        <div onClick={() => handlePenaltyPick(teamB)} className={`winner-select p-2 rounded-lg flex items-center justify-center gap-2 ${isPickedB ? 'active' : 'bg-slate-950/50'} ${teamB === 'TBD' ? 'opacity-40 cursor-not-allowed' : ''}`}>
                            <img src={`https://flagcdn.com/w40/${FLAGS[teamB] || 'un'}.png`} className="flag" alt={teamB} loading="lazy" />
                            <span className="text-[10px] font-black truncate">{teamB}</span>
                            <i className="fa-solid fa-check text-sm check-x"></i>
                        </div>
                    </div>
                </div>

        </div>
    );
});

                    <i className="fa-solid fa-check text-xl check-x"></i>
                </div>
            </div>
        </div>
    );

    const ranking = useMemo(() => {
        return participants.map(p => ({ name: p.name, pts: calculateTotalScore(p.predictions, p.groupsLocked) })).sort((a,b) => b.pts - a.pts);
    }, [participants, calculateTotalScore]);

    // Firebase real-time listeners
    useEffect(() => {
        const unsubP = db.ref('participants').on('value', snap => {
            const val = snap.val();
            const arr = val ? Object.values(val) : [];
            setParticipants(arr);
            // Update current user's local state if they're selected
            if (currentUser) {
                const me = arr.find(p => p.name === currentUser);
                if (me) { setPreds(me.predictions || {}); setGroupsLocked(me.groupsLocked || false); setKnockoutLocked(me.knockoutLocked || false); }
            }
            setFbLoaded(true);
            fbSkipWrite.current = false;
        });
        const unsubO = db.ref('officialResults').on('value', snap => {
            setOfficialResults(snap.val() || {});
        });
        const unsubR = db.ref('r32Matchups').on('value', snap => { setR32Matchups(snap.val() || {}); });
        return () => { db.ref('participants').off('value', unsubP); db.ref('officialResults').off('value', unsubO); db.ref('r32Matchups').off('value', unsubR); };
    }, []);

    useEffect(() => {
        if (!currentUser || !hasUnsaved) return;
        if (autoSaveTimer.current) clearTimeout(autoSaveTimer.current);
        autoSaveTimer.current = setTimeout(() => {
            fbSaveParticipant({ name: currentUser, predictions: preds, groupsLocked, knockoutLocked });
            setHasUnsaved(false); addToast('Auto-guardado completado', 'success');
        }, 2000);
        return () => { if (autoSaveTimer.current) clearTimeout(autoSaveTimer.current); };
    }, [preds, currentUser, hasUnsaved, groupsLocked]);

    useEffect(() => {
        if (!currentUser) return;
        const groupMatches = matches.filter(m => m.phase === 'Grupos');
        const knockoutMatches = matches.filter(m => m.phase !== 'Grupos');
        let total = 0;
        groupMatches.forEach(m => { const p = preds[m.id]; if (p && typeof p.ga === 'number' && typeof p.gb === 'number') total++; });
        knockoutMatches.forEach(m => {
            const p = preds[m.id];
            if (m.phase === 'Dieciseisavos') {
                if (p && typeof p.ga === 'number' && typeof p.gb === 'number') { if (p.ga !== p.gb) total++; else if (p.winner && p.winner !== 'TBD') total++; }
            } else { if (p && p.winner) total++; }
        });
        if (total === matches.length && matches.length > 0) {
            setShowConfetti(true); addToast('\uD83C\uDF89 ¡Completaste TODAS las predicciones!', 'success');
            setTimeout(() => setShowConfetti(false), 4000);
        }
    }, [preds, currentUser, matches]);

    const handleUpdate = useCallback((id, field, value, isOfficial = false) => {
        if (!isOfficial && groupsLocked && id.startsWith('G-')) return;
        if (!isOfficial && knockoutLocked && id.startsWith('M')) return;
        let val;
        if (field === 'winner') val = value;
        else { if (value === "") val = null; else val = Math.max(0, parseInt(value, 10)); }
        if (field !== 'winner' && id.startsWith('M') && !isOfficial) {
            const mNum = parseInt(id.slice(1));
            if (mNum >= 73 && mNum <= 88) {
                setPreds(prev => {
                    const existing = prev[id] || {};
                    const updated = { ...existing, [field]: val };
                    if (typeof updated.ga === 'number' && typeof updated.gb === 'number' && updated.ga !== updated.gb) { delete updated.winner; }
                    return { ...prev, [id]: updated };
                });
                setHasUnsaved(true); return;
            }
        }
        if (isOfficial) {
            setOfficialResults(prev => {
                const existing = prev[id] || {};
                const updated = { ...existing, [field]: val };
                const mNum = parseInt((id.startsWith('M') ? id.slice(1) : '0'));
                if (field !== 'winner' && mNum >= 73 && mNum <= 88) {
                    if (typeof updated.ga === 'number' && typeof updated.gb === 'number' && updated.ga !== updated.gb) { delete updated.winner; }
                }
                const newState = { ...prev, [id]: updated };
                fbSaveOfficial(newState);
                return newState;
            });
        } else { setPreds(prev => ({ ...prev, [id]: { ...(prev[id] || {}), [field]: val } })); setHasUnsaved(true); }
    }, [groupsLocked]);

    const handleLockGroups = useCallback(() => {
        if (window.confirm('¿Bloquear la fase de grupos? Una vez bloqueado, NO podrás modificar los pronósticos de grupos.')) {
            setGroupsLocked(true);
            fbSaveParticipant({ name: currentUser, predictions: preds, groupsLocked: true });
            setHasUnsaved(false);
            addToast('\uD83D\uDD12 ¡Fase de grupos bloqueada! Ahora completá la eliminatoria.', 'success');
        }
    }, [currentUser, preds, addToast]);

    const isKnockoutComplete = useCallback(() => {
        const diec = matches.filter(m => m.phase === 'Dieciseisavos');
        const rest = matches.filter(m => m.phase !== 'Grupos' && m.phase !== 'Dieciseisavos');
        const okDiec = diec.every(m => {
            const p = preds[m.id];
            if (!p || typeof p.ga !== 'number' || typeof p.gb !== 'number') return false;
            if (p.ga === p.gb) return !!p.winner;
            return true;
        });
        const okRest = rest.every(m => { const p = preds[m.id]; return p && !!p.winner; });
        return okDiec && okRest;
    }, [preds, matches]);

    const onLockKnockout = useCallback(() => {

        if (!isKnockoutComplete()) { addToast('Completá toda la eliminatoria antes de bloquear', 'error'); return; }

            setKnockoutLocked(true);
            fbSaveParticipant({ name: currentUser, predictions: preds, groupsLocked, knockoutLocked: true });
            addToast('\uD83D\uDD12 Eliminatoria bloqueada', 'success');
        }
    }, [currentUser, preds, groupsLocked, isKnockoutComplete, addToast]);


    const handleSave = () => {
        if (!currentUser) return;
        const lockNow = groupsLocked && !knockoutLocked && isKnockoutComplete();
        const newKnock = lockNow ? true : knockoutLocked;
        setKnockoutLocked(newKnock);
        fbSaveParticipant({ name: currentUser, predictions: preds, groupsLocked, knockoutLocked: newKnock });

    const handleExportClipboard = async () => {

        const data = JSON.stringify({ name: currentUser, predictions: preds, groupsLocked }, null, 2);

    const handleImportFile = (e) => {

                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                )}
                {view === 'prediction' && (
                    <div className="space-y-8 view-enter">

                        <div className="glass p-6 md:p-10 rounded-[2rem] md:rounded-[3rem] border border-slate-700/30 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex-1 w-full flex gap-3">
                                <select className="flex-1 bg-slate-950 border border-slate-800 p-4 md:p-5 rounded-2xl text-white font-bold outline-none focus:border-[#deff9a]" onChange={(e) => {
                                    const u = participants.find(p => p.name === e.target.value);

                                    setGroupsLocked(u ? (u.groupsLocked || false) : false);

                                    <option value="">-- Elige tu Perfil --</option>

                                    </div>
                                    <div>
                                        <label className="text-[9px] font-black text-slate-600 uppercase mb-2 block">Archivo JSON</label>
                                        <div className="h-28 bg-slate-900 border-2 border-dashed border-white/10 rounded-2xl flex items-center justify-center relative hover:border-[#deff9a]/30 transition-colors cursor-pointer">
                                            <input type="file" accept=".json" onChange={handleImportFile} className="absolute inset-0 opacity-0 cursor-pointer" />
                                            <div className="text-center"><i className="fa-solid fa-cloud-arrow-up text-2xl text-slate-600 mb-2"></i><p className="text-[10px] text-slate-500 font-bold">Arrastrá o hacé clic</p></div>
                                        </div>
                                        <p className="text-[9px] text-slate-600 mt-3 text-center">Aceptá archivos .json exportados desde la app</p>
                                    </div>
                                </div>
                            </div>
                            <div className="mt-6 flex justify-end">
                                <button onClick={() => { if (window.confirm('¿Cambiar el PIN de administrador?')) { const newPin = window.prompt('Nuevo PIN (4+ caracteres):'); if (newPin && newPin.length >= 4) { localStorage.setItem(ADMIN_PIN_KEY, newPin); addToast('PIN actualizado', 'success'); } else { addToast('PIN muy corto', 'error'); } } }} className="text-[10px] font-bold text-slate-600 hover:text-slate-400 transition-colors uppercase tracking-wider"><i className="fa-solid fa-key mr-2"></i>Cambiar PIN</button>
                            </div>
                        </div>
                        
                        <div className="glass p-8 md:p-12 rounded-[2rem] md:rounded-[3.5rem] border border-yellow-500/10">
                            <h3 className="text-2xl md:text-4xl font-black text-yellow-400 italic uppercase mb-8 md:mb-10"><i className="fa-solid fa-diagram-project mr-3"></i>Cruces Reales — Dieciseisavos</h3>
                            <p className="text-slate-500 text-sm mb-6">Cargá los cruces reales (M73–M88). Esto define los equipos que verán los usuarios en Dieciseisavos.</p>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {Array.from({length:16}, (_,i)=>`M${73+i}`).map(mid => {
                                    const row = r32Matchups?.[mid] || {a:'TBD',b:'TBD'};
                                    return (
                                        <div key={mid} className="bg-slate-900/60 p-4 rounded-2xl border border-slate-800">
                                            <div className="flex items-center justify-between mb-3">
                                                <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">{mid}</span>
                                                <span className="text-[10px] font-black text-yellow-400 uppercase tracking-widest">Cruce real</span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <select value={row.a || 'TBD'} onChange={e=>setR32Matchups(prev=>({...(prev||{}),[mid]:{...(prev?.[mid]||{}),a:e.target.value}}))} className="bg-slate-950 border border-slate-800 p-3 rounded-xl text-white font-bold outline-none focus:border-yellow-400">
                                                    <option value="TBD">TBD</option>
                                                    {ALL_TEAMS.map(t=> <option key={t} value={t}>{t}</option>)}
                                                </select>
                                                <select value={row.b || 'TBD'} onChange={e=>setR32Matchups(prev=>({...(prev||{}),[mid]:{...(prev?.[mid]||{}),b:e.target.value}}))} className="bg-slate-950 border border-slate-800 p-3 rounded-xl text-white font-bold outline-none focus:border-yellow-400">
                                                    <option value="TBD">TBD</option>
                                                    {ALL_TEAMS.map(t=> <option key={t} value={t}>{t}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                            <div className="mt-6 flex flex-col md:flex-row gap-3 justify-end">
                                <button onClick={()=>{ fbSaveR32Matchups(r32Matchups||{}); addToast('Cruces guardados', 'success'); }} className="bg-yellow-500 hover:bg-yellow-400 text-black px-8 py-4 rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2">
                                    <i className="fa-solid fa-floppy-disk"></i> Guardar Cruces
                                </button>
                                <button onClick={()=>{ if(window.confirm('¿Limpiar todos los cruces?')){ setR32Matchups({}); fbSaveR32Matchups({}); addToast('Cruces limpiados', 'warn'); } }} className="bg-slate-800 hover:bg-slate-700 text-white px-8 py-4 rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2">
                                    <i className="fa-solid fa-eraser"></i> Limpiar
                                </button>
                            </div>
                        </div>

<div className="glass p-8 md:p-12 rounded-[2rem] md:rounded-[3.5rem] border border-red-500/10">
                            <h3 className="text-2xl md:text-4xl font-black text-red-500 italic uppercase mb-8 md:mb-12"><i className="fa-solid fa-clipboard-check mr-3"></i>Resultados Oficiales</h3>
                            <PredictionView matches={matches} currentPreds={officialResults} updateFn={(id, f, v) => handleUpdate(id, f, v, true)} isOfficial={true} groupsLocked={true} r32Matchups={r32Matchups} knockoutLocked={false} onLockKnockout={()=>{}} />
                        </div>
                    </div>
                )}
            </main>
            <footer className="max-w-7xl mx-auto px-6 mt-20 py-10 border-t border-white/5 text-center">
                <p className="text-slate-700 text-xs font-bold uppercase tracking-widest">PRODE 26 · Mundial FIFA 2026 · Pasión o Razón · v7 🔥 Firebase (clean)</p>
            </footer>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

    </script>
</body>
</html>
